name: Pizzacalc CI PR

on:
  pull_request:
    branches: [main]

  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [24.x]

    steps:
      - uses: actions/checkout@v6
      - name: Install pnpm
        uses: pnpm/action-setup@v5
      - name: Use Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v6
        with:
          node-version: ${{ matrix.node-version }}
          cache: pnpm
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Build project
        run: pnpm --filter pizzacalc build
      - name: Run tests
        run: pnpm --filter pizzacalc test:coverage
      - name: Lint and format check
        run: pnpm --filter pizzacalc check
      - name: CheckTs
        run: pnpm --filter pizzacalc checkTs
